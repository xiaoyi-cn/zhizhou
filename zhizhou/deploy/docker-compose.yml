version: '3.8'
services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: zhizhou
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: zhizhou
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zhizhou"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ../server
      dockerfile: ../deploy/Dockerfile
    environment:
      DATABASE_URL: postgres://zhizhou:${DB_PASSWORD}@db:5432/zhizhou?sslmode=disable
      JWT_SECRET: ${JWT_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      SMS_API_KEY: ${SMS_API_KEY:-}
      DEPLOY_MODE: ${DEPLOY_MODE:-cloud}
      EMBEDDING_DIM: ${EMBEDDING_DIM:-1536}
      SERVER_PORT: "8080"
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: ../web
      dockerfile: ../deploy/Dockerfile.web
    ports:
      - "3000:80"
    depends_on:
      - server

volumes:
  pgdata: